global:
  enabled: true
  tlsDisable: true

injector:
  enabled: false

server:
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = "true"
      }
      storage "file" {
        path = "/vault/data"
      }

ui:
  enabled: true
  serviceType: "NodePort"