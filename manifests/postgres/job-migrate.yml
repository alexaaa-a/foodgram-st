apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-job
  namespace: foodgram
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: iitssasha/foodgram:latest
          command: ["python", "manage.py", "migrate"]
          envFrom:
            - secretRef:
                name: db-secrets
            - configMapRef:
                name: backend-config
