apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-sts
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: "postgres"
  replicas: {{ .Values.postgresql.primary.replicaCount }}
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
          - name: POSTGRES_DB
            value: {{ .Values.postgresql.auth.database | quote }}
          - name: POSTGRES_USER
            value: {{ .Values.postgresql.auth.username | quote }}
          - name: POSTGRES_PASSWORD
            value: {{ .Values.postgresql.auth.password | quote }}
          - name: DB_HOST
            value: postgres
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi