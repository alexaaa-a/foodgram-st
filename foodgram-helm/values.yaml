global:
  domain: foodgram.local
  namespace: foodgram

backend:
  enabled: true
  replicaCount: 2

  image:
    repository: iitssasha/foodgram
    tag: "latest"

  service:
    type: ClusterIP
    port: 8000

  ingress:
    enabled: true
    hostname: foodgram.local
    annotations:
      kubernetes.io/ingress.class: nginx
    tls:
      enabled: true
      secretName: foodgram-tls

    rules:
      - host: foodgram.local
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: nginx-service
                  port:
                    number: 80
            - path: /api
              pathType: Prefix
              backend:
                service:
                  name: django-service
                  port:
                    number: 8000
            - path: /admin
              pathType: Prefix
              backend:
                service:
                  name: django-service
                  port:
                    number: 8000
            - path: /ws
              pathType: Prefix
              backend:
                service:
                  name: django-service
                  port:
                    number: 8001

  env:
    DJANGO_SETTINGS_MODULE: "foodgram.settings"
    DJANGO_ALLOWED_HOSTS: "backend,localhost,127.0.0.1,foodgram.local"
    DJANGO_DEBUG: "False"
    DB_HOST: "postgres"
    DB_PORT: "5432"

  secrets:
    SECRET_KEY: ref+vault://foodgram/backend#secret_key

  resources:
    limits:
      cpu: "1000m"
      memory: "512Mi"
    requests:
      cpu: "500m"
      memory: "256Mi"

nginx:
  enabled: true
  image:
    repository: iitssasha/foodgram-frontend
    tag: "latest"
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    hostname: "foodgram.local"
    annotations:
      kubernetes.io/ingress.class: nginx
    tls:
      enabled: true
      secretName: foodgram-tls
  resources:
    limits:
      cpu: "200m"
      memory: "128Mi"

jobs:
  enabled: true
  image:
    repository: iitssasha/foodgram
    tag: "latest"
  collectstatic-job:
    enabled: true
    command: [ "python", "manage.py", "collectstatic", "--noinput" ]
  migrate-job:
    enabled: true
    command: [ "python", "manage.py", "migrate", "--noinput" ]
  auth:
    username: ref+vault://foodgram/db#POSTGRES_USER
    database: ref+vault://foodgram/db#POSTGRES_DB
    password: ref+vault://foodgram/db#POSTGRES_PASSWORD

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "13-alpine"
  primary:
    replicaCount: 1
    persistence:
      enabled: true
      size: 5Gi
    service:
      port: 5432
  auth:
    username: ref+vault://foodgram/db#POSTGRES_USER
    database: ref+vault://foodgram/db#POSTGRES_DB
    password: ref+vault://foodgram/db#POSTGRES_PASSWORD
  fullnameOverride: foodgram-postgresql
