nameOverride: prometheus

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelector: {}

    retention: 7d

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 5Gi

    additionalScrapeConfigs:
      - job_name: nginx-ingress
        honor_labels: true
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ingress-nginx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: ingress-nginx
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: controller
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:10254
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - prometheus.foodgram.local
    paths: [/]

alertmanager:
  alertmanagerSpec:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    storage:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.foodgram.local
    paths: [/]

grafana:
  adminPassword: "admin123"

  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  persistence:
    enabled: true
    size: 2Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.foodgram.local
    paths: [/]

  grafana.ini:
    smtp:
      enabled: true
      host: smtp.gmail.com:587
      from_name: "Grafana Foodgram"
      startTLS_policy: MandatoryStartTLS
    server:
      root_url: "http://grafana.foodgram.local"

  envValueFrom:
    GF_SMTP_USER:
      secretKeyRef:
        name: grafana-smtp-secret
        key: GF_SMTP_USER
        optional: true
    GF_SMTP_PASSWORD:
      secretKeyRef:
        name: grafana-smtp-secret
        key: GF_SMTP_PASSWORD
        optional: true
    GF_SMTP_FROM_ADDRESS:
      secretKeyRef:
        name: grafana-smtp-secret
        key: GF_SMTP_FROM_ADDRESS
        optional: true

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 6417
        revision: 1
        datasource: Prometheus

nodeExporter:
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

kube-state-metrics:
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

prometheusOperator:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
