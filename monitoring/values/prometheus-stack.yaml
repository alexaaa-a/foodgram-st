nameOverride: prometheus

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Scrape ServiceMonitors from all namespaces, not only those with matching labels
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    ruleSelector: {}

    retention: 7d

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 5Gi

    # Scrape ingress-nginx metrics from pods on port 10254
    additionalScrapeConfigs:
      - job_name: nginx-ingress
        honor_labels: true
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ingress-nginx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: ingress-nginx
          - source_labels: [__address__]
            action: replace
            regex: (.+)(?::\d+)
            replacement: $1:10254
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - prometheus.foodgram.local
    paths: [/]

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    storage:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.foodgram.local
    paths: [/]

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  adminPassword: "admin123"

  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  persistence:
    enabled: true
    size: 2Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.foodgram.local
    paths: [/]

  # SMTP — заполни после получения токена (см. docs/monitoring-setup.md)
  grafana.ini:
    smtp:
      enabled: true
      host: smtp.gmail.com:587
      user: ""             # ← вставь Gmail-адрес
      password: ""         # ← вставь App Password из Google Account
      from_address: ""     # ← тот же Gmail-адрес
      from_name: "Grafana Foodgram"
      startTLS_policy: MandatoryStartTLS
    server:
      root_url: "http://grafana.foodgram.local"

  # Preload Loki as a datasource
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

  # Preloaded dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 6417
        revision: 1
        datasource: Prometheus

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# ── Kube-State-Metrics ────────────────────────────────────────────────────────
kube-state-metrics:
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ── Prometheus Operator ───────────────────────────────────────────────────────
prometheusOperator:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
