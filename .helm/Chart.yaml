apiVersion: v2
name: foodgram
description: Foodgram — recipe sharing platform (werf project)
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: backend
    version: 0.1.0
    repository: "file://charts/backend"
    condition: backend.enabled
  - name: nginx
    version: 0.1.0
    repository: "file://charts/nginx"
    condition: nginx.enabled
  - name: db
    version: 0.1.0
    repository: "file://charts/db"
    condition: db.enabled
  - name: redis
    version: 0.1.0
    repository: "file://charts/redis"
    condition: redis.enabled
  - name: rabbitmq
    version: 0.1.0
    repository: "file://charts/rabbitmq"
    condition: rabbitmq.enabled
  - name: jobs
    version: 0.1.0
    repository: "file://charts/jobs"
    condition: jobs.enabled
  - name: celery
    version: 0.1.0
    repository: "file://charts/celery"
    condition: celery.enabled
  - name: flower
    version: 0.1.0
    repository: "file://charts/flower"
    condition: flower.enabled
