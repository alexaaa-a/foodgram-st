apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
      - name: django

        image: {{ include "backend.image" . | quote }}
        ports:
        - containerPort: {{ .Values.service.port }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
          - name: media-storage
            mountPath: {{ .Values.volumes.media.mountPath }}
          - name: backend-static
            mountPath: {{ .Values.volumes.static.mountPath }}
        env:
          - name: POSTGRES_DB
            value: {{ .Values.global.db.name | quote }}
          - name: POSTGRES_USER
            value: {{ .Values.global.db.user | quote }}
          - name: POSTGRES_PASSWORD
            value: {{ .Values.global.db.password | quote }}
          - name: DB_HOST
            value: {{ .Values.global.db.host | quote }}
          - name: SECRET_KEY
            value: {{ .Values.global.django.secretKey | quote }}
          - name: VAULT_ADDR
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_ADDR
          - name: VAULT_ROLE_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_ROLE_ID
          - name: VAULT_SECRET_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_SECRET_ID
        envFrom:
          - configMapRef:
              name: {{ .Values.configMap }}
          - secretRef:
              name: {{ .Values.secret }}
      {{- if .Values.consumers.enabled }}
      - name: quote-consumer
        image: {{ include "backend.image" . | quote }}
        command: [ "python", "rabbitmq/consumer.py", "quote" ]
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        env:
          - name: VAULT_ADDR
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_ADDR
          - name: VAULT_ROLE_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_ROLE_ID
          - name: VAULT_SECRET_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_SECRET_ID
        volumeMounts:
          - name: data-storage
            mountPath: {{ .Values.volumes.data.mountPath }}
      - name: cat-consumer
        image: {{ include "backend.image" . | quote }}
        command: [ "python", "rabbitmq/consumer.py", "cat_fact" ]
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        env:
          - name: VAULT_ADDR
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_ADDR
          - name: VAULT_ROLE_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_ROLE_ID
          - name: VAULT_SECRET_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secret }}
                key: VAULT_SECRET_ID
        volumeMounts:
          - name: data-storage
            mountPath: {{ .Values.volumes.data.mountPath }}
      {{- end }}
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: {{ .Values.volumes.media.pvcName }}
        - name: backend-static
          persistentVolumeClaim:
            claimName: {{ .Values.volumes.static.pvcName }}
        {{- if .Values.consumers.enabled }}
        - name: data-storage
          persistentVolumeClaim:
            claimName: {{ .Values.volumes.data.pvcName }}
        {{- end }}
