apiVersion: batch/v1
kind: Job
metadata:
  name: collectstatic-job
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "jobs.labels" . | nindent 4 }}
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: collectstatic
          image: {{ include "jobs.backendImage" . | quote }}
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: backend-static
              mountPath: /app/static
          env:
            - name: POSTGRES_DB
              value: {{ .Values.global.db.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.global.db.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.global.db.password | quote }}
            - name: DB_HOST
              value: {{ .Values.global.db.host | quote }}
            - name: SECRET_KEY
              value: {{ .Values.global.django.secretKey | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.config.secret }}
            - configMapRef:
                name: {{ .Values.config.name }}
      volumes:
        - name: backend-static
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}
