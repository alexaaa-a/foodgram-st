apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foodgram-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://{{ .Values.global.domain }}"
    nginx.ingress.kubernetes.io/enable-cors: "true"
  labels:
    {{- include "nginx.labels" . | nindent 4 }}
spec:
  tls:
    - hosts:
        - {{ .Values.global.domain }}
      secretName: foodgram-tls
  ingressClassName: nginx
  rules:
  - host: {{ .Values.global.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.ingress.services.nginx }}
            port:
              number: {{ .Values.ingress.services.ports.nginx }}
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.ingress.services.django }}
            port:
              number: {{ .Values.ingress.services.ports.django }}
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.ingress.services.django }}
            port:
              number: {{ .Values.ingress.services.ports.django }}
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.ingress.services.django }}
            port:
              number: {{ .Values.ingress.services.ports.ws }}
