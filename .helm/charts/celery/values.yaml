global:
  namespace: foodgram
  name: celery-worker
  environment: "development"

image:
  repository: iitssasha/foodgram
  tag: "latest"

replicaCount: 1
configMap: backend-config
secret: app-env

resources:
  limits:
    cpu: "500m"
    memory: "384Mi"
  requests:
    cpu: "100m"
    memory: "192Mi"

autoscaling:
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 0