apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.primary.service.name }}-headless-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.primary.service.port }}
      targetPort: {{ .Values.primary.service.targetPort }}
  selector:
    app: {{ .Values.primary.service.name }}