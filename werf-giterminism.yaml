giterminismConfigVersion: "1"

giterminism:
  enabled: true

config:
  goTemplateRendering:
    enabled: true
    allowEnvVariables:
      - VAULT_ADDR
      - VAULT_TOKEN
      - VAULT_ROLE_ID
      - VAULT_SECRET_ID
      - DOCKER_USERNAME
      - DOCKER_PASSWORD
      - WERF_ENV
  stapel:
    allowFromLatest: false
