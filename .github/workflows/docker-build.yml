name: Docker Build & Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/foodgram
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/foodgram-frontend

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-values:
    name: Update image tag in Helm values
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update backend image tag
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s|tag: .*|tag: \"${VERSION}\"|g" \
            foodgram-helm/charts/backend/values.yaml \
            foodgram-helm/charts/celery/values.yaml \
            foodgram-helm/charts/flower/values.yaml \
            foodgram-helm/charts/jobs/values.yaml
          sed -i "s|tag: .*|tag: \"${VERSION}\"|g" \
            foodgram-helm/charts/nginx/values.yaml

      - name: Commit updated values
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump image tag to ${{ steps.version.outputs.VERSION }} [skip ci]"
          file_pattern: "foodgram-helm/charts/**/values.yaml"
